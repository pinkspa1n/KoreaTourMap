<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<p>Click the buttons to download PNG icons, then save them in this folder.</p>
<button onclick="generate(192)">Download icon-192.png</button>
<button onclick="generate(512)">Download icon-512.png</button>
<canvas id="c" style="display:none"></canvas>
<script>
function generate(size) {
  const c = document.getElementById('c');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.219; // corner radius ~112/512
  // Background
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r); ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.closePath();
  ctx.fillStyle = '#0071e3'; ctx.fill();
  // Map pin
  const s = size/512;
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(256*s, 220*s, 120*s, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#0071e3';
  ctx.beginPath(); ctx.arc(256*s, 220*s, 42*s, 0, Math.PI*2); ctx.fill();
  // Triangle tail
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.moveTo(200*s, 290*s); ctx.lineTo(256*s, 400*s); ctx.lineTo(312*s, 290*s);
  ctx.closePath(); ctx.fill();

  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `icon-${size}.png`;
  a.click();
}
</script>
</body>
</html>
